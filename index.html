<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimworks</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        .coming-soon-container {
            text-align: center;
            position: relative;
            transform: perspective(300px) rotateX(2deg);
            filter: blur(0.4px);
        }

        #gr {
            font-size: 1rem;
            color: #888;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #cs {
            font-size: 3rem;
            color: #b00;
            text-transform: uppercase;
            letter-spacing: -2px;
            position: relative;
            display: inline-block;

            text-shadow: 
                -2px -2px 0 #500,
                2px 2px 0 #111,
                -3px 3px 1px #000,
                0px 0px 8px #f00,
                -3px 0 0.5px rgba(255,0,0,0.5),
                3px 0 0.5px rgba(0,255,255,0.3);

            animation: fnafJitter 4s infinite linear; 
        }

        @keyframes fnafJitter {
            0%, 100% { transform: skewX(-1deg) translateY(0px);}
            25% { transform: skewX(1deg) translateY(-1px);}
            50% { transform: skewX(-2deg) translateY(1px);}
            75% { transform: skewX(0.5deg) translateY(-0.5px);}
        }

        .credits {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>
    <div class="coming-soon-container">
        <p id="gr">grimworks</p> 

        <h1 id="cs">coming soon</h1>
    </div>

    <div class="credits">grimworks</div>

</body>
</html>
